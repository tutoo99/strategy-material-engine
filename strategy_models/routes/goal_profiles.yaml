      - YouTube 创作者
      - 新手创作者
    preferred_domains:
      - AI视频内容创业
    preferred_case_refs:
      - cases/youtube_seedance2真人爆款视频.md
    risk_notes:
      - 没做 IP 验证就直接生成，极易白费生成成本。
      - AI 分镜和镜头草稿必须人工校对，不能直出。
    feedback_metrics:
      - 已验证 IP 数
      - 已拆脚本数
      - 完成分镜数
      - 7 天出片数

