      - cases/B站悬赏带货实战手册.md
      - cases/bilibili_case_approved.md
      - cases/bilibili_haowu_gmv54w.md
    risk_notes:
      - 没有选品逻辑时，评论区优化无法单独救活转化。
      - 大促节点只能放大已有路径，不能替代基本功。
