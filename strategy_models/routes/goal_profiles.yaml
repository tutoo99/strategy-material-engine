      - 冷启动验证
      - 长尾流量
    secondary_strategies:
      - 强结果选题
      - 细分选题
    preferred_platforms:
      - B站
    preferred_user_types:
      - 个人副业者
      - 职场新人
      - 内容创业者
    preferred_domains:
      - 内容副业
      - 副业教育 / 知识付费
      - 内容电商
    preferred_case_refs:
      - cases/bilibili_case_approved.md
      - cases/在B站教年轻人赚钱月入三万，从0成为数字游民，全流程底层逻辑分享.md
    risk_notes:
      - 没有真实结果时不要滥用强结果标题。
      - 预算和时间有限时，不要同时开多个承接入口。
    feedback_metrics:
      - 内容产出数
      - 首轮播放 / 点击
      - 高意图评论 / 私信
      - 首次留资数
